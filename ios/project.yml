name: NimShare
options:
  bundleIdPrefix: email.nimtz
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: ""
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    MARKETING_VERSION: "1.10.63"
    CURRENT_PROJECT_VERSION: "5"
targets:
  NimShare:
    type: application
    platform: iOS
    sources:
      - NimShare/Sources
    resources:
      - NimShare/Resources
    info:
      path: NimShare/Info.plist
      properties:
        CFBundleDisplayName: NimShare
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleDevelopmentRegion: de
        CFBundleLocalizations: [de, en, fr, it, es, nl]
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
        NSPhotoLibraryUsageDescription: "Choose a photo or file to share via NimShare."
        NSCameraUsageDescription: "Take a photo to share via NimShare."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: email.nimtz.nimshare
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTS_MACCATALYST: NO
