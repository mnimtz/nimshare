name: NimShare
options:
  bundleIdPrefix: email.nimtz
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    # v1.10.64: Marcus's Apple-Team direkt fest verdrahtet (KQGPPH4S33 —
    # dieselbe Team-ID wie für MySecurePrint / photoflow / alle anderen
    # email.nimtz.*-Bundles). Vorher stand hier "", was jeder xcodegen-
    # Regenerate über Marcus's manuelle Team-Auswahl im Signing-Tab
    # wischte. Jetzt: einmal setzen, für immer stabil.
    DEVELOPMENT_TEAM: KQGPPH4S33
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    MARKETING_VERSION: "1.10.113"
    CURRENT_PROJECT_VERSION: "27"
targets:
  NimShare:
    type: application
    platform: iOS
    # v1.10.65: xcodegen 2.45 hat KEIN separates `resources:`-Feld —
    # der Eintrag wurde stumm ignoriert (0 Refs in pbxproj → Runtime-
    # Fehler "No image named 'AppLogo'"). ALLE Files, inkl. Asset-
    # Catalog und xcstrings, gehen unter `sources:`. xcodegen routet
    # sie per Datei-Endung in die richtige BuildPhase (.swift → Compile,
    # .xcassets/.xcstrings → Resources mit actool).
    sources:
      - NimShare/Sources
      - NimShare/Resources
    info:
      path: NimShare/Info.plist
      properties:
        CFBundleDisplayName: NimShare
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleDevelopmentRegion: de
        CFBundleLocalizations: [de, en, fr, it, es, nl]
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
        NSPhotoLibraryUsageDescription: "Choose a photo or file to share via NimShare."
        NSCameraUsageDescription: "Take a photo to share via NimShare."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: email.nimtz.nimshare
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTS_MACCATALYST: NO
